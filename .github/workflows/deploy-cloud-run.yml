name: Deploy Cloud Run

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  WEB_SERVICE: stock-drawdown-chart-web
  FORECAST_SERVICE: stock-drawdown-forecast-api
  REGION: asia-northeast1
  WEB_ARTIFACT_REPOSITORY: stock-drawdown
  FORECAST_ARTIFACT_REPOSITORY: stock-drawdown-forecast

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

  deploy-forecast:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      forecast_url: ${{ steps.forecast-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build forecast container
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/$FORECAST_ARTIFACT_REPOSITORY/$FORECAST_SERVICE:${GITHUB_REF_NAME}"
          echo "FORECAST_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          BUILD_ID="$(gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --config cloudbuild.forecast.yaml \
            --substitutions "_IMAGE=$IMAGE" \
            --async \
            --format='value(id)' \
            .)"
          echo "Cloud Build ID: $BUILD_ID"
          for attempt in $(seq 1 120); do
            STATUS="$(gcloud builds describe "$BUILD_ID" --project "${{ secrets.GCP_PROJECT_ID }}" --format='value(status)')"
            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) exit 1 ;;
            esac
            sleep 5
          done
          exit 1

      - name: Deploy forecast service
        run: |
          gcloud run deploy "$FORECAST_SERVICE" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --image "$FORECAST_IMAGE" \
            --no-allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1 \
            --memory 2Gi \
            --cpu 1 \
            --service-account "stock-drawdown-forecast-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Read forecast service URL
        id: forecast-url
        run: |
          URL="$(gcloud run services describe "$FORECAST_SERVICE" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --format='value(status.url)')"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs:
      - verify
      - deploy-forecast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build web container
        run: |
          IMAGE="$REGION-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/$WEB_ARTIFACT_REPOSITORY/$WEB_SERVICE:${GITHUB_REF_NAME}"
          echo "WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          BUILD_ID="$(gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --tag "$IMAGE" \
            --async \
            --format='value(id)' \
            .)"
          echo "Cloud Build ID: $BUILD_ID"
          for attempt in $(seq 1 120); do
            STATUS="$(gcloud builds describe "$BUILD_ID" --project "${{ secrets.GCP_PROJECT_ID }}" --format='value(status)')"
            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) exit 1 ;;
            esac
            sleep 5
          done
          exit 1

      - name: Deploy web service
        run: |
          ENV_VARS="APP_AUTH_ENABLED=true,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},MARKET_DATA_PROVIDER=${{ vars.MARKET_DATA_PROVIDER }},MARKET_DATA_CACHE_BACKEND=${{ vars.MARKET_DATA_CACHE_BACKEND }},MARKET_DATA_CACHE_GCS_BUCKET=${{ vars.MARKET_DATA_CACHE_GCS_BUCKET }},MARKET_DATA_CACHE_GCS_PREFIX=${{ vars.MARKET_DATA_CACHE_GCS_PREFIX }},FORECAST_PREVIEW_ENABLED=${{ vars.FORECAST_PREVIEW_ENABLED }},FORECAST_SERVICE_URL=${{ needs.deploy-forecast.outputs.forecast_url }}"
          if [ -n "${{ secrets.ALLOWED_EMAIL }}" ]; then
            ENV_VARS="$ENV_VARS,ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }}"
          fi

          gcloud run deploy "$WEB_SERVICE" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --image "$WEB_IMAGE" \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 1 \
            --memory 512Mi \
            --cpu 1 \
            --service-account "stock-drawdown-runtime@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars "$ENV_VARS"
