name: Deploy Cloud Run

on:
  push:
    tags:
      - "v*"
      - "stg-v*"

permissions:
  contents: read
  id-token: write

jobs:
  resolve_environment:
    runs-on: ubuntu-latest
    outputs:
      target_environment: ${{ steps.resolve.outputs.target_environment }}
      is_production: ${{ steps.resolve.outputs.is_production }}
    steps:
      - name: Resolve deployment environment from tag
        id: resolve
        run: |
          case "$GITHUB_REF_NAME" in
            stg-v*)
              echo "target_environment=staging" >> "$GITHUB_OUTPUT"
              echo "is_production=false" >> "$GITHUB_OUTPUT"
              ;;
            v*)
              echo "target_environment=production" >> "$GITHUB_OUTPUT"
              echo "is_production=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported deployment tag: $GITHUB_REF_NAME" >&2
              exit 1
              ;;
          esac

  verify:
    needs: resolve_environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        if: needs.resolve_environment.outputs.is_production == 'true'
        run: |
          git fetch origin main
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

  deploy-forecast:
    needs:
      - resolve_environment
      - verify
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_environment.outputs.target_environment }}
    concurrency:
      group: deploy-${{ needs.resolve_environment.outputs.target_environment }}
      cancel-in-progress: false
    outputs:
      forecast_url: ${{ steps.forecast-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build forecast container
        run: |
          IMAGE="${{ vars.REGION || 'asia-northeast1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.FORECAST_ARTIFACT_REPOSITORY }}/${{ vars.FORECAST_SERVICE }}:${GITHUB_REF_NAME}"
          echo "FORECAST_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          BUILD_ID="$(gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "projects/${{ secrets.GCP_PROJECT_ID }}/serviceAccounts/${{ vars.CLOUD_BUILD_SERVICE_ACCOUNT }}" \
            --config cloudbuild.forecast.yaml \
            --substitutions "_IMAGE=$IMAGE" \
            --async \
            --format='value(id)' \
            .)"
          echo "Cloud Build ID: $BUILD_ID"
          for attempt in $(seq 1 120); do
            STATUS="$(gcloud builds describe "$BUILD_ID" --project "${{ secrets.GCP_PROJECT_ID }}" --format='value(status)')"
            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) exit 1 ;;
            esac
            sleep 5
          done
          exit 1

      - name: Deploy forecast service
        run: |
          gcloud run deploy "${{ vars.FORECAST_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'asia-northeast1' }}" \
            --image "$FORECAST_IMAGE" \
            --no-allow-unauthenticated \
            --min-instances "${{ vars.FORECAST_MIN_INSTANCES || '0' }}" \
            --max-instances "${{ vars.FORECAST_MAX_INSTANCES || '1' }}" \
            --memory "${{ vars.FORECAST_MEMORY || '2Gi' }}" \
            --cpu "${{ vars.FORECAST_CPU || '1' }}" \
            --service-account "${{ vars.FORECAST_RUNTIME_SERVICE_ACCOUNT }}"

      - name: Read forecast service URL
        id: forecast-url
        run: |
          URL="$(gcloud run services describe "${{ vars.FORECAST_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'asia-northeast1' }}" \
            --format='value(status.url)')"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs:
      - resolve_environment
      - verify
      - deploy-forecast
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve_environment.outputs.target_environment }}
    concurrency:
      group: deploy-${{ needs.resolve_environment.outputs.target_environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build web container
        run: |
          IMAGE="${{ vars.REGION || 'asia-northeast1' }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.WEB_ARTIFACT_REPOSITORY }}/${{ vars.WEB_SERVICE }}:${GITHUB_REF_NAME}"
          echo "WEB_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          BUILD_ID="$(gcloud builds submit \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --service-account "projects/${{ secrets.GCP_PROJECT_ID }}/serviceAccounts/${{ vars.CLOUD_BUILD_SERVICE_ACCOUNT }}" \
            --config cloudbuild.web.yaml \
            --substitutions "_IMAGE=$IMAGE" \
            --async \
            --format='value(id)' \
            .)"
          echo "Cloud Build ID: $BUILD_ID"
          for attempt in $(seq 1 120); do
            STATUS="$(gcloud builds describe "$BUILD_ID" --project "${{ secrets.GCP_PROJECT_ID }}" --format='value(status)')"
            echo "Cloud Build status: $STATUS"
            case "$STATUS" in
              SUCCESS) exit 0 ;;
              FAILURE|INTERNAL_ERROR|TIMEOUT|CANCELLED|EXPIRED) exit 1 ;;
            esac
            sleep 5
          done
          exit 1

      - name: Deploy web service
        run: |
          ENV_VARS="APP_AUTH_ENABLED=true,GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},MARKET_DATA_PROVIDER=${{ vars.MARKET_DATA_PROVIDER }},MARKET_DATA_CACHE_BACKEND=${{ vars.MARKET_DATA_CACHE_BACKEND }},MARKET_DATA_CACHE_GCS_BUCKET=${{ vars.MARKET_DATA_CACHE_GCS_BUCKET }},MARKET_DATA_CACHE_GCS_PREFIX=${{ vars.MARKET_DATA_CACHE_GCS_PREFIX }},FORECAST_PREVIEW_ENABLED=${{ vars.FORECAST_PREVIEW_ENABLED }},FORECAST_SERVICE_URL=${{ needs.deploy-forecast.outputs.forecast_url }},PUBLIC_ANALYSIS_BUCKET=${{ vars.PUBLIC_ANALYSIS_BUCKET }},PUBLIC_ANALYSIS_PREFIX=${{ vars.PUBLIC_ANALYSIS_PREFIX || 'public-analysis' }},PUBLIC_ANALYSIS_LOOKBACK_YEARS=${{ vars.PUBLIC_ANALYSIS_LOOKBACK_YEARS || '5' }},PUBLIC_ANALYSIS_PROVIDER=${{ vars.PUBLIC_ANALYSIS_PROVIDER || 'yfinance' }},PUBLIC_SITE_URL=${{ vars.PUBLIC_SITE_URL }}"
          if [ -n "${{ secrets.ALLOWED_EMAIL }}" ]; then
            ENV_VARS="$ENV_VARS,ALLOWED_EMAIL=${{ secrets.ALLOWED_EMAIL }}"
          fi

          gcloud run deploy "${{ vars.WEB_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'asia-northeast1' }}" \
            --image "$WEB_IMAGE" \
            --allow-unauthenticated \
            --min-instances "${{ vars.WEB_MIN_INSTANCES || '0' }}" \
            --max-instances "${{ vars.WEB_MAX_INSTANCES || '1' }}" \
            --memory "${{ vars.WEB_MEMORY || '512Mi' }}" \
            --cpu "${{ vars.WEB_CPU || '1' }}" \
            --service-account "${{ vars.WEB_RUNTIME_SERVICE_ACCOUNT }}" \
            --set-env-vars "$ENV_VARS"

      - name: Update public analysis Cloud Run jobs
        run: |
          if [ -z "${{ secrets.JQUANTS_API_KEY }}" ]; then
            echo "JQUANTS_API_KEY secret is required for public-analysis jobs." >&2
            exit 1
          fi
          JOB_ENV_VARS="PUBLIC_ANALYSIS_BUCKET=${{ vars.PUBLIC_ANALYSIS_BUCKET }},PUBLIC_ANALYSIS_PREFIX=${{ vars.PUBLIC_ANALYSIS_PREFIX || 'public-analysis' }},PUBLIC_ANALYSIS_LOOKBACK_YEARS=${{ vars.PUBLIC_ANALYSIS_LOOKBACK_YEARS || '5' }},PUBLIC_ANALYSIS_PROVIDER=${{ vars.PUBLIC_ANALYSIS_PROVIDER || 'yfinance' }}"
          JOB_ENV_VARS="$JOB_ENV_VARS,JQUANTS_API_KEY=${{ secrets.JQUANTS_API_KEY }}"

          gcloud run jobs update "${{ vars.PUBLIC_ANALYSIS_REFRESH_JOB }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'asia-northeast1' }}" \
            --image "$WEB_IMAGE" \
            --service-account "${{ vars.WEB_RUNTIME_SERVICE_ACCOUNT }}" \
            --command python \
            --args stock_drawdown_app.py,refresh-public-analysis \
            --set-env-vars "$JOB_ENV_VARS"

          gcloud run jobs update "${{ vars.PUBLIC_ANALYSIS_PUBLISH_JOB }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.REGION || 'asia-northeast1' }}" \
            --image "$WEB_IMAGE" \
            --service-account "${{ vars.WEB_RUNTIME_SERVICE_ACCOUNT }}" \
            --command python \
            --args stock_drawdown_app.py,publish-public-analysis \
            --set-env-vars "$JOB_ENV_VARS"
